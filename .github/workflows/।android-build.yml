name: Code-Vault Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List all files
        run: ls -R  # यह कमांड पूरी रिपॉजिटरी का स्ट्रक्चर दिखाएगी

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # यहाँ gradlew का स्टेप हटा दिया है क्योंकि पहले हम फाइल लोकेशन देखेंगे
      - name: Build Code-Vault APK
        run: ./gradlew assembleDebug || ./app/gradlew assembleDebug

      - name: Upload Code-Vault APK
        uses: actions/upload-artifact@v4
        with:
          name: Code-Vault
          path: app/build/outputs/apk/debug/app-debug.apk
