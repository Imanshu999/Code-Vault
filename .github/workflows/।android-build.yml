name: Code-Vault Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # यहाँ हमने पाथ चेक करने के लिए एक स्टेप जोड़ा है
      - name: List files to verify gradlew location
        run: ls -R

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew # यहाँ ./ जोड़ा गया है ताकि वह रूट को देख सके

      - name: Build Code-Vault APK
        run: ./gradlew assembleDebug

      - name: Upload Code-Vault APK
        uses: actions/upload-artifact@v4
        with:
          name: Code-Vault
          path: app/build/outputs/apk/debug/app-debug.apk
