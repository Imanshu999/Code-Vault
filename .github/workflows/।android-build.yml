name: Code-Vault Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # v3 से v4 में बदलें

      - name: Set up JDK 17
        uses: actions/setup-java@v4  # v3 से v4 में बदलें
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Code-Vault APK
        run: ./gradlew assembleDebug

      - name: Upload Code-Vault APK
        uses: actions/upload-artifact@v4  # v3 से v4 में बदलें
        with:
          name: Code-Vault
          path: app/build/outputs/apk/debug/app-debug.apk
